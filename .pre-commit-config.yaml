repos:
  # ── Standard hygiene ────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=2000"]

  # ── Ruff (lint + format) ────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # ── Tests (pre-push only) ───────────────────────────────────
  - repo: local
    hooks:
      - id: pytest
        name: pytest-fast
        entry: uv run --with pyarrow pytest tests/ -q -m "not slow"
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
