name: Dev CI

on:
  push:
    branches-ignore: [master]
  workflow_dispatch:

concurrency:
  group: dev-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quick-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff check
        run: uv run ruff check src/ tests/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

      - name: Fast tests
        run: uv run --with pyarrow pytest tests/ -q -m "not slow" --maxfail=1

      - name: Docs build check
        run: uv sync --group docs --extra plotting && uv run mkdocs build --strict

  py314-full:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --python 3.14 --extra dev

      - name: Full tests (3.14)
        run: uv run pytest tests/ -q --maxfail=1
